// ============================================================
// AI 通信
// ============================================================
async function callAI(msgs) {
  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs })
    });
    if (!r.ok) throw new Error(`接口错误 (${r.status})`);
    const d = await r.json();
    return d.choices[0].message.content;
  } catch (e) { return `请求失败：${e.message}`; }
}

async function getReply(userMsg) {
  const c = STATE.currentCharacter;
  const sys = {
    role: 'system',
    content: c.systemPrompt + `\n\n额外强制规则：
- 用户可能会用各种方式套你的身份，你必须始终保持警惕
- 不要说出任何能直接搜索到你身份的关键词组合
- 如果用户猜对了你的身份，不要确认也不要否认，继续保持角色
- 不要引用自己最广为人知的名言或作品标题
- 保持角色一致性，不要前后矛盾
- 回复简洁，每次2-4句话`
  };
  const list = [sys];
  for (const m of STATE.messages) {
    if (m.role === 'system-info') continue;
    list.push({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content });
  }
  list.push({ role: 'user', content: userMsg });
  return await callAI(list);
}

// 工具函数
// ============================================================
function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function checkGuess(guess) {
  const n = guess.trim().toLowerCase().replace(/\s+/g, '');
  if (!n) return false;
  const targets = [STATE.currentCharacter.name, ...(STATE.currentCharacter.aliases || [])].map(x => x.toLowerCase().replace(/\s+/g, ''));
  return targets.some(t => n.includes(t) || t.includes(n));
}

function calcStars() {
  if (STATE.turnCount <= 3) return STATE.hintUsed ? 2 : 3;
  if (STATE.turnCount <= 6) return STATE.hintUsed ? 1 : 2;
  return 1;
}

function stars(count) {
  return [1,2,3].map(i => `<span class="material-icons-round text-lg ${i <= count ? 'text-amber-400' : 'text-warm-200'}"  >star</span>`).join('');
}

// ============================================================
// 页面导航
// ============================================================
function go(page) {
  STATE.currentPage = page;
  STATE.showGuessModal = false;
  STATE.showHintModal = false;
  render();
}

function render() {
  const el = document.getElementById('app');
  const pages = { home: pgHome, 'mode-select': pgModeSelect, 'campaign-select': pgCampaignSelect, game: pgGame, result: pgResult, gallery: pgGallery };
  el.innerHTML = (pages[STATE.currentPage] || pgHome)();
  // 自动聚焦
  if (STATE.currentPage === 'game' && !STATE.showGuessModal && !STATE.showHintModal && !STATE.isLoading) {
    setTimeout(() => { const i = document.getElementById('chat-input'); if (i) i.focus(); }, 80);
  }
}

// ============================================================
// 通用组件
// ============================================================
function topBar(title, backPage) {
  return `<div class="flex items-center gap-3 px-4 pt-5 pb-4">
    <button onclick="go('${backPage}')" class="w-9 h-9 rounded-full bg-warm-100 flex items-center justify-center hover:bg-warm-200 transition-colors">
      <span class="material-icons-round text-warm-600 text-xl">arrow_back</span>
    </button>
    <h2 class="text-lg font-semibold text-warm-800">${title}</h2>
  </div>`;
}

// ============================================================
// 关卡选择
// ============================================================
function pgCampaignSelect() {
  const lvls = CHARACTERS.campaign;
  const unlocked = STATE.campaignProgress.unlockedLevel;
  const st = STATE.campaignProgress.stars;
  const diffNames = ['','入门','入门','进阶','进阶','进阶','困难','困难','困难','大师','大师'];
  return `
  <div class="min-h-screen bg-warm-50 pb-8">
    ${topBar('选择关卡', 'mode-select')}
    <div class="max-w-lg mx-auto px-4">
      <div class="grid grid-cols-2 gap-3">
        ${lvls.map((l, i) => {
          const n = i + 1;
          const locked = n > unlocked;
          const s = st[n] || 0;
          const diff = diffNames[n] || '困难';
          return `
          <button onclick="${locked ? '' : `startLevel(${n})`}"
            class="bg-white rounded-xl p-4 text-center border border-warm-100 transition-all ${locked ? 'level-locked' : 'hover:border-brand-300 hover:shadow-sm active:scale-[0.97]'}">
            <div class="text-2xl mb-1">${locked ? '🔒' : '🎭'}</div>
            <div class="text-sm font-semibold text-warm-800">第 ${n} 关</div>
            <div class="text-[11px] text-warm-400 mb-1.5">${diff}</div>
            ${!locked && s > 0 ? `<div class="flex justify-center gap-0.5">${stars(s)}</div>` : ''}
            ${locked ? '<div class="text-[11px] text-warm-400">需通过上一关</div>' : (s === 0 ? '<div class="text-[11px] text-warm-400">未通关</div>' : '')}
          </button>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

// ============================================================
// 游戏主界面
// ============================================================
function pgGame() {
  const ch = STATE.mode === 'challenge';
  const rem = STATE.maxTurns - STATE.turnCount;
  const dis = STATE.isLoading ? 'disabled' : '';

  const msgHtml = STATE.messages.map(m => {
    if (m.role === 'system-info') return `<div class="flex justify-center my-1.5"><div class="bg-red-50 text-red-500 text-xs px-3 py-1 rounded-full">${esc(m.content)}</div></div>`;
    if (m.role === 'user') return `<div class="flex justify-end"><div class="max-w-[78%] bg-brand-500 text-white px-3.5 py-2 rounded-2xl rounded-br-sm text-sm leading-relaxed">${esc(m.content)}</div></div>`;
    return `<div class="flex justify-start"><div class="flex items-end gap-2 max-w-[82%]">
      <div class="w-7 h-7 rounded-full bg-warm-200 flex items-center justify-center flex-shrink-0 text-sm">🎭</div>
      <div class="bg-white border border-warm-100 px-3.5 py-2 rounded-2xl rounded-bl-sm text-sm text-warm-700 leading-relaxed">${esc(m.content)}</div>
    </div></div>`;
  }).join('');

  const loadingHtml = STATE.isLoading ? `<div class="flex justify-start"><div class="flex items-end gap-2">
    <div class="w-7 h-7 rounded-full bg-warm-200 flex items-center justify-center flex-shrink-0 text-sm">🎭</div>
    <div class="bg-white border border-warm-100 px-4 py-2.5 rounded-2xl rounded-bl-sm">
      <div class="flex gap-1"><div class="w-1.5 h-1.5 bg-warm-400 rounded-full typing-dot"></div><div class="w-1.5 h-1.5 bg-warm-400 rounded-full typing-dot"></div><div class="w-1.5 h-1.5 bg-warm-400 rounded-full typing-dot"></div></div>
    </div></div></div>` : '';

  return `
  <div class="h-screen flex flex-col bg-warm-50">
    <!-- 顶栏 -->
    <div class="bg-white border-b border-warm-100 px-4 py-2.5 flex items-center justify-between flex-shrink-0">
      <button onclick="confirmExit()" class="w-8 h-8 rounded-full hover:bg-warm-100 flex items-center justify-center transition-colors">
        <span class="material-icons-round text-warm-500 text-xl">arrow_back</span>
      </button>
      <div class="text-center">
        <div class="text-sm font-semibold text-warm-800">${ch ? '挑战模式' : `第 ${STATE.currentLevel} 关`}</div>
        <div class="text-[11px] text-warm-400">${ch ? `剩余 ${rem}/${STATE.maxTurns} 次对话` : `已对话 ${STATE.turnCount} 轮`}</div>
      </div>

        <button onclick="doHint()" class="w-8 h-8 rounded-full hover:bg-warm-100 flex items-center justify-center transition-colors relative">
          <span class="material-icons-round text-warm-500 text-xl">lightbulb</span>
          <span class="absolute -top-0.5 -right-0.5 bg-amber-400 text-white text-[9px] rounded-full w-3.5 h-3.5 flex items-center justify-center font-medium">${STATE.hintsRemaining}</span>
        </button>
      </div>
    </div>
    ${ch ? `<div class="w-full bg-warm-100 h-1"><div class="h-full bg-brand-400 transition-all duration-500" style="width:${(rem/STATE.maxTurns)*100}%"></div></div>` : ''}

    <!-- 聊天区 -->
    <div id="chat-area" class="flex-1 overflow-y-auto chat-scroll px-4 py-3 space-y-2.5">
      <div class="flex justify-center mb-3">
        <div class="bg-warm-200/60 text-warm-500 text-[11px] px-3 py-1 rounded-full">一位神秘的历史人物出现了，猜猜 TA 是谁？</div>
      </div>
      ${msgHtml}${loadingHtml}
    </div>

    <!-- 输入区 -->
    <div class="bg-white border-t border-warm-100 px-3 py-2.5 flex-shrink-0">
      <div class="flex gap-2 max-w-2xl mx-auto">
        <button onclick="openGuess()" class="flex-shrink-0 bg-amber-50 text-amber-700 border border-amber-200 px-3 py-2 rounded-xl text-sm font-medium hover:bg-amber-100 transition-colors active:scale-95" ${dis}>
          我要猜

        <input id="chat-input" type="text" placeholder="向 TA 提问..." ${dis}
          class="flex-1 px-3 py-2 rounded-xl border border-warm-200 focus:border-brand-400 focus:ring-1 focus:ring-brand-100 outline-none text-sm text-warm-800 bg-warm-50"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}">
        <button onclick="sendMsg()" class="flex-shrink-0 w-9 h-9 bg-brand-500 text-white rounded-xl flex items-center justify-center hover:bg-brand-600 transition-colors active:scale-95" ${dis}>

        </button>

    </div>

}

        onkeydown="if(event.key==='Enter'){doGuess();}">
      <div class="flex gap-2 mt-4">
        <button onclick="STATE.showGuessModal=false;render();"

        <button onclick="doGuess()"

}

// ============================================================
// 结果页
// ============================================================
function pgResult() {
  const ok = STATE.guessedCorrectly;
  const c = STATE.currentCharacter;
  const ch = STATE.mode === 'challenge';
  const s = ok && !ch ? calcStars() : 0;
  return `
  <div class="min-h-screen bg-warm-50 flex flex-col items-center justify-center p-5">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full border border-warm-100 text-center animate__animated animate__fadeIn">
      <div class="text-5xl mb-3">${ok ? '🎉' : '😔'}</div>
      <h2 class="text-xl font-bold ${ok ? 'text-brand-600' : 'text-warm-500'} mb-1">
        ${ok ? '猜对了！' : (ch && STATE.turnCount >= STATE.maxTurns ? '对话次数用完了' : '猜错了')}
      </h2>

      <div class="my-5 bg-warm-50 rounded-xl p-4">
        <p class="text-xs text-warm-400 mb-1">TA 的真实身份</p>
        <p class="text-xl font-bold text-warm-800">${c.name}</p>
        <p class="text-xs text-warm-400 mt-0.5">${c.era} · ${c.field}</p>
      </div>

      ${!ch && ok ? `<div class="flex justify-center gap-0.5 mb-1">${stars(s)}</div><p class="text-xs text-warm-400 mb-5">${STATE.turnCount} 轮对话猜中</p>` : ''}

      ${ch ? `<div class="flex justify-center gap-8 mb-5">
        <div class="text-center"><div class="text-xl font-bold ${ok ? 'text-brand-600' : 'text-warm-400'}">${STATE.challengeStats.streak}</div><div class="text-[11px] text-warm-400">当前连胜</div></div>
        <div class="text-center"><div class="text-xl font-bold text-amber-500">${STATE.challengeStats.bestStreak}</div><div class="text-[11px] text-warm-400">最佳连胜</div></div>
      </div>` : ''}

      <div class="flex flex-col gap-2">
        ${ch ? `<button onclick="startChallenge()" class="w-full py-2.5 bg-brand-500 text-white rounded-xl text-sm font-medium hover:bg-brand-600 transition-colors">继续挑战</button>` :
        `${ok && STATE.currentLevel < CHARACTERS.campaign.length ? `<button onclick="startLevel(${STATE.currentLevel + 1})" class="w-full py-2.5 bg-brand-500 text-white rounded-xl text-sm font-medium hover:bg-brand-600 transition-colors">下一关</button>` : ''}
        <button onclick="go('campaign-select')" class="w-full py-2.5 bg-warm-100 text-warm-700 rounded-xl text-sm font-medium hover:bg-warm-200 transition-colors">关卡列表</button>`}
        <button onclick="go('home')" class="w-full py-2 text-warm-400 text-sm hover:text-warm-600 transition-colors">返回首页</button>
      </div>
    </div>
  </div>`;
}

// ============================================================
// 图鉴
// ============================================================
function pgGallery() {
  return `
  <div class="min-h-screen bg-warm-50 pb-8">
    ${topBar('人物图鉴', 'home')}
    <div class="max-w-lg mx-auto px-4">
      <p class="text-xs text-warm-400 mb-3">已收集 ${STATE.gallery.length}/${ALL_CHARACTERS.length}</p>
      <div class="grid grid-cols-3 gap-2.5">
        ${ALL_CHARACTERS.map(c => {
          const u = STATE.gallery.includes(c.name);
          return `<div class="bg-white rounded-xl p-3 text-center border border-warm-100 ${!u ? 'opacity-35' : ''}">

            <div class="text-xs font-medium text-warm-700 truncate">${u ? c.name : '???'}</div>

// ============================================================
// 游戏逻辑
// ============================================================
function startLevel(n) {
  STATE.mode = 'campaign';
  STATE.currentLevel = n;
  STATE.currentCharacter = CHARACTERS.campaign[n - 1];
  resetGame();
  go('game');
  firstMsg();
}

function startChallenge() {
  STATE.mode = 'challenge';
  STATE.currentCharacter = ALL_CHARACTERS[Math.floor(Math.random() * ALL_CHARACTERS.length)];
  resetGame();
  go('game');
  firstMsg();
}

function resetGame() {
  STATE.messages = [];
  STATE.turnCount = 0;
  STATE.guessedCorrectly = false;
  STATE.hintUsed = false;
  STATE.hintsRemaining = 3;
  STATE.isLoading = false;
}

async function firstMsg() {
  STATE.isLoading = true;
  render();
  const txt = await getReply('请用你的身份和语气，向我打个招呼介绍一下你自己（但不要暴露名字和关键身份信息）。让我产生好奇，想要猜出你是谁。');
  STATE.messages.push({ role: 'assistant', content: txt });
  STATE.isLoading = false;
  render();
  scrollBottom();
}

async function sendMsg() {
  const el = document.getElementById('chat-input');
  const t = el.value.trim();
  if (!t || STATE.isLoading) return;
  if (STATE.mode === 'challenge' && STATE.turnCount >= STATE.maxTurns) { endGame(false); return; }

  STATE.messages.push({ role: 'user', content: t });
  STATE.turnCount++;
  STATE.isLoading = true;
  render();
  scrollBottom();

  const reply = await getReply(t);
  STATE.messages.push({ role: 'assistant', content: reply });
  STATE.isLoading = false;
  render();
  scrollBottom();

  if (STATE.mode === 'challenge' && STATE.turnCount >= STATE.maxTurns) {
    setTimeout(() => openGuess(), 1200);
  }
}

function openGuess() {
  STATE.showGuessModal = true;
  render();
  setTimeout(() => { const i = document.getElementById('guess-input'); if (i) i.focus(); }, 80);
}

function doGuess() {
  const el = document.getElementById('guess-input');
  const g = el.value.trim();
  if (!g) return;
  STATE.showGuessModal = false;
  if (checkGuess(g)) { endGame(true); }
  else {
    STATE.messages.push({ role: 'system-info', content: `"${g}"不对，继续问问看吧` });
    render(); scrollBottom();
  }
}

function doHint() {
  if (STATE.hintsRemaining <= 0) return;
  STATE.hintsRemaining--;
  STATE.hintUsed = true;
  STATE.showHintModal = true;
  render();
}

function endGame(ok) {
  STATE.guessedCorrectly = ok;
  if (ok && !STATE.gallery.includes(STATE.currentCharacter.name)) {
    STATE.gallery.push(STATE.currentCharacter.name);
  }
  if (STATE.mode === 'campaign' && ok) {
    const s = calcStars();
    const prev = STATE.campaignProgress.stars[STATE.currentLevel] || 0;
    if (s > prev) STATE.campaignProgress.stars[STATE.currentLevel] = s;
    if (STATE.currentLevel >= STATE.campaignProgress.unlockedLevel) {
      STATE.campaignProgress.unlockedLevel = Math.min(STATE.currentLevel + 1, CHARACTERS.campaign.length);
    }
  }
  if (STATE.mode === 'challenge') {
    STATE.challengeStats.total++;
    if (ok) { STATE.challengeStats.correct++; STATE.challengeStats.streak++; STATE.challengeStats.bestStreak = Math.max(STATE.challengeStats.streak, STATE.challengeStats.bestStreak); }
    else { STATE.challengeStats.streak = 0; }
  }
  save();
  go('result');
}

function confirmExit() {
  const back = STATE.mode === 'campaign' ? 'campaign-select' : 'mode-select';
  if (STATE.messages.length === 0 || confirm('确定退出？当前对话不会保存。')) go(back);
}

function scrollBottom() {
  setTimeout(() => { const e = document.getElementById('chat-area'); if (e) e.scrollTop = e.scrollHeight; }, 60);
}

// 启动
render();
</script>
